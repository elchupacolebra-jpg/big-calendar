<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Big A## Calendar 2026</title>
<script src="https://accounts.google.com/gsi/client" onload="window._gsiReady=true; if(window._onGsiReady) window._onGsiReady();" async></script>
<style>
:root {
  --bg: #f4f6fa; --surface: #fff; --border: #dce3f0; --text: #1a2a4a;
  --text2: #5a6a8a; --text3: #8a9ab8; --blue: #185FA5; --blue-light: #e8f0fa;
  --green: #639922; --green-light: #e8f5e9; --danger: #A32D2D;
  --danger-light: #faeaea; --r: 8px; --rl: 12px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Barlow Condensed', 'Arial Narrow', Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
button { font-family: inherit; cursor: pointer; }
input, textarea { font-family: inherit; }
textarea { resize: vertical; }
#app { min-height: 100vh; }

/* LOADING */
.loader-wrap { display:flex; align-items:center; justify-content:center; min-height:100vh; }
.spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--text); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* LOGIN */
.login-wrap { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1rem; }
.login-box { max-width:420px; width:100%; background:var(--surface); border:2px solid var(--text); border-radius:4px; padding:2.5rem 2rem; text-align:center; }
.login-logo { font-size:28px; font-weight:900; letter-spacing:0.12em; text-transform:uppercase; color:var(--text); margin-bottom:4px; }
.login-year { font-size:40px; font-weight:900; color:var(--blue); letter-spacing:0.2em; margin-bottom:20px; }
.login-sub { color:var(--text2); margin-bottom:28px; font-size:14px; line-height:1.6; }
.btn-primary { width:100%; padding:13px; background:var(--text); color:#fff; border:none; border-radius:var(--r); font-size:14px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; transition:opacity 0.15s; }
.btn-primary:hover { opacity:0.85; }
.error-box { margin-top:12px; padding:10px; background:#ffebee; border:1px solid #e24b4a; border-radius:var(--r); color:var(--danger); font-size:13px; display:none; }

/* HEADER */
.header { padding:12px 16px 10px; border-bottom:2px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; background:var(--surface); position:sticky; top:0; z-index:10; }
.header-title { font-size:clamp(14px,3vw,26px); font-weight:900; letter-spacing:0.18em; text-transform:uppercase; color:var(--text); }
.header-title span { color:var(--blue); }
.header-sub { color:var(--text3); font-size:9px; letter-spacing:0.1em; text-transform:uppercase; margin-top:3px; }
.header-right { display:flex; align-items:center; gap:7px; flex-wrap:wrap; }
.legend { display:flex; gap:5px; flex-wrap:wrap; }
.legend-item { display:flex; align-items:center; gap:3px; }
.legend-dot { width:8px; height:8px; border-radius:2px; }
.legend-label { color:var(--text3); font-size:9px; }
.btn-sm { padding:5px 11px; border-radius:6px; font-size:10px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; white-space:nowrap; border:1px solid var(--border); }
.btn-gcal-off { background:#f0f4fa; color:var(--blue); }
.btn-gcal-on  { background:var(--green-light); color:var(--green); border-color:var(--green); }
.btn-categories { background:#f0f4fa; color:var(--blue); }
.btn-signout { background:var(--bg); color:var(--text2); font-weight:600; }

/* GRID */
.grid-wrap { overflow-x:auto; padding:4px 6px 8px; height:calc(100vh - 96px); box-sizing:border-box; }
.cal-table { border-collapse:collapse; table-layout:fixed; width:max-content; min-width:100%; height:calc(100vh - 110px); }
.cal-table colgroup col:first-child { width:46px; }
.th-month { padding:3px 6px; text-align:left; color:var(--text3); font-size:9px; font-weight:700; letter-spacing:0.1em; position:sticky; left:0; background:var(--bg); border-right:1px solid var(--border); z-index:3; }
.th-day { text-align:center; padding:3px 1px; color:var(--text3); font-size:9px; font-weight:700; }
.td-month { padding:1px 6px; color:var(--blue); font-size:clamp(8px,1.3vw,11px); font-weight:800; letter-spacing:0.14em; text-transform:uppercase; position:sticky; left:0; background:var(--bg); z-index:2; border-right:1px solid var(--border); white-space:nowrap; vertical-align:middle; text-align:center; }
.td-day { height:calc((100vh - 110px) / 12); min-height:40px; border:0.5px solid var(--border); background:#fff; vertical-align:top; padding:2px 3px; position:relative; transition:background 0.1s; overflow:hidden; max-width:0; }
.td-day.valid { cursor:pointer; }
.td-day.invalid { background:#eef0f5; }
.td-day.is-weekend { background:#edf0f7; }
.td-day.is-today { border:1px solid #9ac5f0; background:#e8f5ff; }
.td-day.is-selected { border:1px solid var(--blue) !important; background:#deeeff !important; }
.td-day.valid:hover { background:#d8e8fa !important; }
.ev-pill { display:block; width:100%; font-size:clamp(7px,0.75vw,10px); font-weight:600; color:#fff; border-radius:2px; padding:1px 3px; margin-bottom:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.3; opacity:0.9; }
.ev-overflow { position:absolute; bottom:1px; right:2px; font-size:7px; color:var(--blue); font-weight:700; }
.today-ring { position:absolute; inset:1px; border:1px solid var(--blue); border-radius:1px; pointer-events:none; }

/* PANEL */
.panel-wrap { padding:0 12px 24px; }
.panel-card { max-width:520px; margin:0 auto; background:var(--surface); border:1px solid var(--border); border-radius:var(--rl); padding:24px; }
.panel-eyebrow { color:var(--blue); font-size:10px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; margin-bottom:5px; }
.panel-title { color:var(--text); font-size:26px; font-weight:900; letter-spacing:0.06em; }
.panel-sub { color:#b0bcd4; font-size:12px; margin-left:10px; }
.panel-close { background:none; border:none; color:#b0bcd4; font-size:22px; line-height:1; padding:2px 6px; }
.ev-card { border-radius:var(--r); padding:10px 12px; margin-bottom:8px; display:flex; align-items:flex-start; gap:10px; border:1px solid transparent; }
.ev-tag { display:inline-block; padding:1px 7px; border-radius:3px; color:#fff; font-size:8px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:5px; }
.ev-gcal-badge { font-size:9px; color:var(--green); font-weight:600; margin-left:6px; }
.ev-text { color:var(--text); font-size:15px; line-height:1.45; word-break:break-word; }
.btn-edit { background:var(--blue-light); border:none; border-radius:4px; color:var(--blue); font-size:11px; padding:4px 9px; font-weight:600; }
.btn-del { background:var(--danger-light); border:none; border-radius:4px; color:var(--danger); font-size:11px; padding:4px 9px; font-weight:600; }
.section-label { color:var(--text3); font-size:9px; font-weight:700; letter-spacing:0.15em; text-transform:uppercase; margin-bottom:10px; }
.new-textarea { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:7px; color:var(--text); font-size:14px; padding:10px 12px; margin-bottom:12px; outline:none; min-height:70px; }
.cat-btn { display:flex; align-items:center; gap:10px; padding:7px 10px; border-radius:7px; cursor:pointer; text-align:left; border:1px solid var(--border); background:var(--bg); width:100%; transition:all 0.1s; margin-bottom:5px; }
.cat-btn.selected { border-width:1.5px; }
.cat-dot-sm { width:14px; height:14px; border-radius:3px; flex-shrink:0; }
.cat-label { font-size:13px; }
.cat-check { margin-left:auto; font-size:14px; }
.gcal-note { font-size:11px; margin-top:6px; }
.add-btn { width:100%; padding:11px; background:var(--blue); border:none; border-radius:7px; color:#fff; font-size:12px; font-weight:800; letter-spacing:0.14em; text-transform:uppercase; margin-top:8px; transition:opacity 0.15s; }
.add-btn:disabled { opacity:0.4; cursor:default; }
.divider { border-top:1px solid #e8edf5; padding-top:18px; margin-top:4px; }
.edit-form-textarea { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:13px; padding:7px 10px; margin-bottom:8px; outline:none; min-height:60px; }
.edit-cat-btn { display:flex; align-items:center; gap:8px; padding:5px 8px; border-radius:6px; cursor:pointer; text-align:left; border:1px solid var(--border); background:var(--bg); width:100%; margin-bottom:4px; }
.edit-cat-btn.selected { border-width:1.5px; }
.edit-dot { width:12px; height:12px; border-radius:3px; flex-shrink:0; }
.save-btn { flex:1; padding:6px; background:var(--blue); border:none; border-radius:5px; color:#fff; font-size:11px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; }
.cancel-btn { padding:6px 12px; background:var(--bg); border:1px solid var(--border); border-radius:5px; color:var(--text3); font-size:11px; }
.empty-note { color:#c0cce0; font-size:13px; font-style:italic; margin-bottom:4px; }

/* CATEGORIES PAGE */
.cats-wrap { padding:20px; }
.cats-card { max-width:440px; margin:0 auto; background:var(--surface); border:1px solid var(--border); border-radius:var(--rl); padding:24px; }
.cats-row { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
.cats-swatch { width:28px; height:28px; border-radius:6px; flex-shrink:0; }
.cats-input { flex:1; background:var(--bg); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:14px; padding:8px 12px; outline:none; font-weight:600; }
.cats-reset { background:none; border:1px solid var(--border); border-radius:5px; color:#b0bcd4; font-size:11px; padding:4px 8px; }
.cats-save { flex:1; padding:11px; background:var(--blue); border:none; border-radius:7px; color:#fff; font-size:12px; font-weight:800; letter-spacing:0.14em; text-transform:uppercase; }
.cats-reset-all { padding:11px 16px; background:var(--bg); border:1px solid var(--border); border-radius:7px; color:var(--text3); font-size:11px; font-weight:600; }

@media (max-width: 500px) {
  .header { padding:10px 12px 8px; }
  .panel-card { padding:18px 14px; }
}
</style>
</head>
<body>
<div id="app"><div class="loader-wrap"><div class="spinner"></div></div></div>

<script type="module">
import { initializeApp }           from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged }
                                    from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
import { getDatabase, ref, set, remove, onValue }
                                    from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

// ─── REPLACE THESE WITH YOUR FIREBASE PROJECT VALUES ─────────────────────────
// (You can reuse the same project as Life by Design — just copy from Firebase Console)
const FB_CONFIG = {
  apiKey:            "AIzaSyD0Q8de-2bjSX4vpjaeA3PeBBqWFbPL0js",
  authDomain:        "bigasscalendar-7e760.firebaseapp.com",
  databaseURL:       "https://bigasscalendar-7e760-default-rtdb.firebaseio.com",
  projectId:         "bigasscalendar-7e760",
  storageBucket:     "bigasscalendar-7e760.firebasestorage.app",
  messagingSenderId: "494370450164",
  appId:             "1:494370450164:web:9a7bc82952c293a185cca1"
};
// Your Google OAuth Client ID — found in Firebase Console > Authentication >
// Sign-in method > Google > Web client ID
const GOOGLE_CLIENT_ID = "494370450164-55d1telq9ep2fed23hjbneo6v8l1pvo6.apps.googleusercontent.com";
// ─────────────────────────────────────────────────────────────────────────────

const MONTHS     = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const MONTH_ABBR = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
const DIM        = [31,28,31,30,31,30,31,31,30,31,30,31];  // days in each month 2026
const DOW_LABEL  = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

const COLORS = [
  { id:"blue",   bg:"#378ADD", lt:"#B5D4F4", gcal:"7"  },
  { id:"red",    bg:"#E24B4A", lt:"#F7C1C1", gcal:"10" },
  { id:"green",  bg:"#639922", lt:"#C0DD97", gcal:"9"  },
  { id:"amber",  bg:"#EF9F27", lt:"#FAC775", gcal:"5"  },
  { id:"purple", bg:"#7F77DD", lt:"#CECBF6", gcal:"3"  },
  { id:"coral",  bg:"#D85A30", lt:"#F5C4B3", gcal:"6"  },
  { id:"teal",   bg:"#1D9E75", lt:"#9FE1CB", gcal:"7"  },
  { id:"pink",   bg:"#D4537E", lt:"#F4C0D1", gcal:"4"  },
];
const DEF_LABELS = { blue:"Blue", red:"Red", green:"Green", amber:"Amber", purple:"Purple", coral:"Coral", teal:"Teal", pink:"Pink" };

// ─── STATE ────────────────────────────────────────────────────────────────────
let auth, db, fbProvider;
let user        = null;
let authChecked = false;
let events      = {};           // { "m-d": [{id, text, color, gcalId?}] }
let labels      = {...DEF_LABELS};
let selDay      = null;         // {m, d}
let view        = 'cal';        // 'cal' | 'cats'
let editId      = null;
let editText    = '';
let editColor   = 'blue';
let newText     = '';
let newColor    = 'blue';
let draftLabels = {...DEF_LABELS};
let gcalToken   = null;
let tokenClient = null;
let pendingFn   = null;
let hidePast    = true;

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const getDOW    = (m,d) => new Date(2026,m,d).getDay();
const getDOY    = (m,d) => { let n=0; for(let i=0;i<m;i++) n+=DIM[i]; return n+d; };
const ci        = id  => COLORS.find(c=>c.id===id) || COLORS[0];
const ek        = (m,d) => `${m}-${d}`;
const evs       = (m,d) => events[ek(m,d)] || [];
const esc       = s   => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmt2      = n   => String(n).padStart(2,'0');
const dateStr   = (m,d) => `2026-${fmt2(m+1)}-${fmt2(d)}`;
const nextDate  = (m,d) => { const nd=new Date(2026,m,d+1); return `${nd.getFullYear()}-${fmt2(nd.getMonth()+1)}-${fmt2(nd.getDate())}`; };

// ─── FIREBASE ─────────────────────────────────────────────────────────────────
function initFirebase() {
  const app = initializeApp(FB_CONFIG);
  auth       = getAuth(app);
  db         = getDatabase(app);
  fbProvider = new GoogleAuthProvider();

  onAuthStateChanged(auth, u => {
    user        = u;
    authChecked = true;
    if (u) {
      loadData();
      if (window._gsiReady && !tokenClient) initGCal();
      else window._onGsiReady = () => { if (user && !tokenClient) initGCal(); };
    } else {
      events = {}; labels = {...DEF_LABELS}; selDay = null; view = 'cal';
      gcalToken = null;
    }
    render();
  });
}

function loadData() {
  onValue(ref(db, `users/${user.uid}/bigcal/events`), snap => {
    events = snap.val() || {};
    renderGrid();
    if (selDay) renderPanel();
  });
  onValue(ref(db, `users/${user.uid}/bigcal/labels`), snap => {
    labels = snap.val() ? {...DEF_LABELS, ...snap.val()} : {...DEF_LABELS};
    renderHeader();
    if (selDay) renderPanel();
  });
}

async function fbSave(m, d, list) {
  const k = ek(m, d);
  if (!list || list.length === 0) await remove(ref(db, `users/${user.uid}/bigcal/events/${k}`));
  else await set(ref(db, `users/${user.uid}/bigcal/events/${k}`), list);
}

async function fbSaveLabels(lbs) {
  await set(ref(db, `users/${user.uid}/bigcal/labels`), lbs);
}

// ─── GOOGLE CALENDAR ──────────────────────────────────────────────────────────
function initGCal() {
  if (!window.google || tokenClient) return;
  tokenClient = window.google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: 'https://www.googleapis.com/auth/calendar.events',
    callback: resp => {
      if (resp.error) return;
      gcalToken = resp.access_token;
      renderHeader();
      if (pendingFn) { pendingFn(); pendingFn = null; }
    }
  });
  renderHeader();
}

function connectGCal() {
  if (!tokenClient) return;
  tokenClient.requestAccessToken({ prompt: gcalToken ? '' : 'consent' });
}

async function gcalPost(m, d, ev) {
  if (!gcalToken) return null;
  try {
    const res = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
      method: 'POST',
      headers: { Authorization: `Bearer ${gcalToken}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        summary:     ev.text,
        description: `Category: ${labels[ev.color]}`,
        colorId:     ci(ev.color).gcal,
        start:       { date: dateStr(m, d) },
        end:         { date: nextDate(m, d) }
      })
    });
    if (res.status === 401) { gcalToken = null; renderHeader(); return null; }
    return (await res.json()).id || null;
  } catch { return null; }
}

async function gcalPatch(gcalId, ev) {
  if (!gcalToken || !gcalId) return;
  try {
    const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events/${gcalId}`, {
      method: 'PATCH',
      headers: { Authorization: `Bearer ${gcalToken}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        summary:     ev.text,
        description: `Category: ${labels[ev.color]}`,
        colorId:     ci(ev.color).gcal
      })
    });
    if (res.status === 401) { gcalToken = null; renderHeader(); }
  } catch {}
}

async function gcalDel(gcalId) {
  if (!gcalToken || !gcalId) return;
  try {
    const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events/${gcalId}`, {
      method: 'DELETE', headers: { Authorization: `Bearer ${gcalToken}` }
    });
    if (res.status === 401) { gcalToken = null; renderHeader(); }
  } catch {}
}

// ─── EVENT CRUD ───────────────────────────────────────────────────────────────
async function doAddEvent() {
  if (!newText.trim() || !selDay) return;
  const {m, d} = selDay;
  const ev = { id: Date.now().toString(), text: newText.trim(), color: newColor };
  const list = [...evs(m, d), ev];
  newText = '';
  await fbSave(m, d, list);
  if (gcalToken) {
    const gid = await gcalPost(m, d, ev);
    if (gid) await fbSave(m, d, list.map(e => e.id === ev.id ? {...e, gcalId: gid} : e));
  }
  renderPanel();
}

async function doDelete(evId) {
  if (!selDay) return;
  const {m, d} = selDay;
  const ev = evs(m, d).find(e => e.id === evId);
  await fbSave(m, d, evs(m, d).filter(e => e.id !== evId));
  if (ev?.gcalId) await gcalDel(ev.gcalId);
  editId = null;
  renderPanel();
}

async function doSaveEdit(evId) {
  if (!selDay || !editText.trim()) return;
  const {m, d} = selDay;
  const old = evs(m, d).find(e => e.id === evId);
  await fbSave(m, d, evs(m, d).map(e => e.id === evId ? {...e, text: editText.trim(), color: editColor} : e));
  if (old?.gcalId) await gcalPatch(old.gcalId, {text: editText.trim(), color: editColor});
  editId = null;
  renderPanel();
}

// ─── HTML BUILDERS ────────────────────────────────────────────────────────────
function htmlLogin() {
  return `<div class="login-wrap">
    <div class="login-box">
      <div class="login-logo">The Big A## Calendar</div>
      <div class="login-year">2026</div>
      <p class="login-sub">Sign in with Google to sync your calendar across all your devices</p>
      <button class="btn-primary" id="loginBtn">Sign in with Google</button>
      <div class="error-box" id="loginErr"></div>
    </div>
  </div>`;
}

function htmlHeader() {
  if (!user) return '';
  const gcalBtnClass = gcalToken ? 'btn-sm btn-gcal-on' : 'btn-sm btn-gcal-off';
  const gcalBtnText  = gcalToken ? '✓ Google Cal On' : 'Connect Google Cal';
  const gcalBtn      = tokenClient ? `<button class="${gcalBtnClass}" data-a="gcal">${gcalBtnText}</button>` : '';
  return `<div class="header">
    <div>
      <div class="header-title">The Big A## Calendar <span>2026</span></div>
      <div class="header-sub">Click any day to view, add and edit events</div>
    </div>
    <div class="header-right">
      <div class="legend">
        ${COLORS.map(c => `<div class="legend-item"><div class="legend-dot" style="background:${c.bg}"></div><span class="legend-label">${esc(labels[c.id])}</span></div>`).join('')}
      </div>
      ${gcalBtn}
      <button class="btn-sm btn-categories" data-a="open-cats">Edit Categories</button>
      <button class="btn-sm ${hidePast ? 'btn-gcal-on' : 'btn-categories'}" data-a="toggle-past">${hidePast ? 'Showing Current+' : 'Show Full Year'}</button>
      <button class="btn-sm btn-signout" data-a="signout">Sign Out</button>
    </div>
  </div>`;
}

function htmlGrid() {
  const today = new Date();
  const currentMonth = today.getFullYear() === 2026 ? today.getMonth() : (today.getFullYear() < 2026 ? 0 : 11);
  let rows = '';
  MONTHS.forEach((month, mi) => {
    if (hidePast && mi < currentMonth) return;
    let cells = '';
    for (let d = 1; d <= 31; d++) {
      const valid    = d <= DIM[mi];
      const evList   = valid ? evs(mi, d) : [];
      const dow      = valid ? getDOW(mi, d) : -1;
      const isWE     = dow === 0 || dow === 6;
      const isToday  = valid && today.getFullYear()===2026 && today.getMonth()===mi && today.getDate()===d;
      const isSel    = selDay && selDay.m===mi && selDay.d===d;
      let cls = 'td-day';
      if (!valid)  cls += ' invalid';
      else {
        cls += ' valid';
        if (isSel)    cls += ' is-selected';
        else if (isToday) cls += ' is-today';
        else if (isWE)    cls += ' is-weekend';
      }
      const attr = valid ? `data-a="day" data-m="${mi}" data-d="${d}"` : '';
      let inner = '';
      if (valid && evList.length > 0) {
        const pills = evList.slice(0,5).map(ev => `<span class="ev-pill" style="background:${ci(ev.color).bg}">${esc(ev.text)}</span>`).join('');
        const more = evList.length > 5 ? `<div class="ev-overflow">+${evList.length-5}</div>` : '';
        inner = pills + more;
      } else if (valid && isToday && evList.length===0) {
        inner = `<div class="today-ring"></div>`;
      }
      cells += `<td class="${cls}" ${attr}>${inner}</td>`;
    }
    rows += `<tr>
      <td class="td-month">${MONTH_ABBR[mi]}</td>
      ${cells}
    </tr>`;
  });
  return `<div class="grid-wrap">
    <table class="cal-table">
      <colgroup>
        <col style="width:46px">
        ${Array.from({length:31}).map(()=>`<col style="width:clamp(20px,2.6vw,36px)">`).join('')}
      </colgroup>
      <thead><tr>
        <th class="th-month">MO</th>
        ${Array.from({length:31},(_,i)=>`<th class="th-day">${i+1}</th>`).join('')}
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function htmlPanel() {
  if (!selDay) return '';
  const {m, d} = selDay;
  const evList = evs(m, d);

  let evHtml = evList.length === 0
    ? `<p class="empty-note">No events yet — add one below.</p>`
    : evList.map(ev => {
        const c = ci(ev.color);
        if (editId === ev.id) {
          return `<div class="ev-card" style="background:${c.lt}55;border-color:${c.bg}40;border-left:3px solid ${c.bg}">
            <div style="flex:1">
              <textarea class="edit-form-textarea" id="editTA" data-evid="${ev.id}" rows="2">${esc(editText)}</textarea>
              <div style="margin-bottom:8px">
                ${COLORS.map(bc => `
                  <button class="edit-cat-btn${editColor===bc.id?' selected':''}" data-a="set-edit-col" data-col="${bc.id}"
                    style="${editColor===bc.id ? `background:${bc.lt}88;border-color:${bc.bg}` : ''}">
                    <div class="edit-dot" style="background:${bc.bg}"></div>
                    <span style="font-size:12px;font-weight:${editColor===bc.id?700:500};color:${editColor===bc.id?'#1a2a4a':'#5a6a8a'}">${esc(labels[bc.id])}</span>
                    ${editColor===bc.id?`<span style="margin-left:auto;color:${bc.bg};font-size:12px">✓</span>`:''}
                  </button>`).join('')}
              </div>
              <div style="display:flex;gap:6px">
                <button class="save-btn" data-a="save-edit" data-evid="${ev.id}">Save</button>
                <button class="cancel-btn" data-a="cancel-edit">Cancel</button>
              </div>
            </div>
          </div>`;
        }
        const gcalBadge = ev.gcalId ? `<span class="ev-gcal-badge">Google Cal</span>` : '';
        return `<div class="ev-card" style="background:${c.lt}55;border-color:${c.bg}40;border-left:3px solid ${c.bg}">
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px">
              <span class="ev-tag" style="background:${c.bg}">${esc(labels[ev.color])}</span>${gcalBadge}
            </div>
            <p class="ev-text">${esc(ev.text)}</p>
          </div>
          <div style="display:flex;gap:4px;flex-shrink:0">
            <button class="btn-edit" data-a="edit-ev" data-evid="${ev.id}">Edit</button>
            <button class="btn-del"  data-a="del-ev"  data-evid="${ev.id}">Del</button>
          </div>
        </div>`;
      }).join('');

  const gcalNote = gcalToken
    ? `<p class="gcal-note" style="color:#639922">Events will sync to your Google Calendar automatically</p>`
    : `<p class="gcal-note" style="color:var(--text3)">Connect Google Calendar in the header to auto-sync events</p>`;

  return `<div class="panel-wrap">
    <div class="panel-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px">
        <div>
          <div class="panel-eyebrow">${MONTHS[m]} ${d}, 2026</div>
          <div style="display:flex;align-items:baseline">
            <span class="panel-title">${DOW_LABEL[getDOW(m,d)]}</span>
            <span class="panel-sub">Day ${getDOY(m,d)} of 365</span>
          </div>
        </div>
        <button class="panel-close" data-a="close-panel">&#x2715;</button>
      </div>
      <div style="margin-bottom:20px">${evHtml}</div>
      <div class="divider">
        <div class="section-label">Add New Event</div>
        <textarea class="new-textarea" id="newTA" placeholder="Type your event... (Enter to save)">${esc(newText)}</textarea>
        <div class="section-label" style="margin-top:4px">Category</div>
        <div style="margin-bottom:8px">
          ${COLORS.map(c => `
            <button class="cat-btn${newColor===c.id?' selected':''}" data-a="set-new-col" data-col="${c.id}"
              style="${newColor===c.id ? `background:${c.lt}88;border-color:${c.bg}` : ''}">
              <div class="cat-dot-sm" style="background:${c.bg}"></div>
              <span class="cat-label" style="font-weight:${newColor===c.id?700:500};color:${newColor===c.id?'#1a2a4a':'#5a6a8a'}">${esc(labels[c.id])}</span>
              ${newColor===c.id?`<span class="cat-check" style="color:${c.bg}">&#x2713;</span>`:''}
            </button>`).join('')}
        </div>
        ${gcalNote}
        <button class="add-btn" data-a="add-ev">+ Add Event</button>
      </div>
    </div>
  </div>`;
}

function htmlCats() {
  return `<div class="cats-wrap">
    <div class="cats-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
        <div>
          <div class="panel-eyebrow">Manage Categories</div>
          <div style="color:var(--text);font-size:20px;font-weight:900">Color Labels</div>
        </div>
        <button class="panel-close" data-a="close-cats">&#x2715;</button>
      </div>
      <p style="color:var(--text3);font-size:12px;margin:0 0 16px;line-height:1.5">
        Rename each color — e.g. Work, Family, Travel, Fitness. Labels save to your account.
      </p>
      <div style="margin-bottom:22px">
        ${COLORS.map(c => `
          <div class="cats-row">
            <div class="cats-swatch" style="background:${c.bg}"></div>
            <input class="cats-input" data-a="edit-label" data-col="${c.id}"
              value="${esc(draftLabels[c.id] || '')}" maxlength="20" placeholder="${DEF_LABELS[c.id]}">
            <button class="cats-reset" data-a="reset-label" data-col="${c.id}">Reset</button>
          </div>`).join('')}
      </div>
      <div style="display:flex;gap:8px">
        <button class="cats-save" data-a="save-cats">Save Labels</button>
        <button class="cats-reset-all" data-a="reset-all">Reset All</button>
      </div>
    </div>
  </div>`;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  if (!authChecked) { app.innerHTML = `<div class="loader-wrap"><div class="spinner"></div></div>`; return; }
  if (!user) { app.innerHTML = htmlLogin(); return; }
  if (view === 'cats') { app.innerHTML = htmlCats(); return; }
  app.innerHTML = `
    <div id="hdr">${htmlHeader()}</div>
    <div id="grd">${htmlGrid()}</div>
    <div id="pnl">${htmlPanel()}</div>
  `;
}

function renderHeader() {
  const el = document.getElementById('hdr');
  if (el) el.innerHTML = htmlHeader();
}
function renderGrid() {
  const el = document.getElementById('grd');
  if (el) el.innerHTML = htmlGrid();
}
function renderPanel() {
  const el = document.getElementById('pnl');
  if (el) el.innerHTML = htmlPanel();
  else render();
}

// ─── EVENT HANDLING ───────────────────────────────────────────────────────────
function readNewTA()  { const t = document.getElementById('newTA');   if (t) newText  = t.value; }
function readEditTA() { const t = document.getElementById('editTA');  if (t) editText = t.value; }
function focusNewTA() { setTimeout(() => { const t = document.getElementById('newTA');  if (t) { t.focus(); t.setSelectionRange(t.value.length,t.value.length); } }, 20); }
function focusEditTA(){ setTimeout(() => { const t = document.getElementById('editTA'); if (t) { t.focus(); t.setSelectionRange(t.value.length,t.value.length); } }, 20); }

document.getElementById('app').addEventListener('click', async e => {
  // Login button
  if (e.target.id === 'loginBtn') {
    try { await signInWithPopup(auth, fbProvider); }
    catch (err) {
      const el = document.getElementById('loginErr');
      if (el) { el.style.display = 'block'; el.textContent = err.message; }
    }
    return;
  }

  const el = e.target.closest('[data-a]');
  if (!el) return;
  const a = el.dataset.a;

  if (a === 'signout') {
    gcalToken = null; tokenClient = null;
    await signOut(auth);
    return;
  }
  if (a === 'toggle-past') { hidePast = !hidePast; renderHeader(); renderGrid(); return; }
  if (a === 'gcal') { connectGCal(); return; }

  if (a === 'open-cats') {
    draftLabels = {...labels}; view = 'cats'; render(); return;
  }
  if (a === 'close-cats') { view = 'cal'; render(); return; }
  if (a === 'reset-all')  { draftLabels = {...DEF_LABELS}; render(); return; }
  if (a === 'reset-label') { draftLabels[el.dataset.col] = DEF_LABELS[el.dataset.col]; render(); return; }
  if (a === 'save-cats') {
    labels = {...draftLabels};
    await fbSaveLabels(labels);
    view = 'cal'; render(); return;
  }

  if (a === 'day') {
    readNewTA();
    selDay    = { m: parseInt(el.dataset.m), d: parseInt(el.dataset.d) };
    newText   = ''; newColor = 'blue'; editId = null;
    renderPanel();
    setTimeout(() => document.getElementById('pnl')?.scrollIntoView({behavior:'smooth', block:'start'}), 60);
    return;
  }
  if (a === 'close-panel') { selDay = null; editId = null; renderPanel(); return; }

  if (a === 'set-new-col') {
    readNewTA();
    newColor = el.dataset.col;
    renderPanel();
    focusNewTA();
    return;
  }
  if (a === 'add-ev') {
    readNewTA();
    await doAddEvent();
    return;
  }

  if (a === 'edit-ev') {
    const ev = evs(selDay.m, selDay.d).find(e => e.id === el.dataset.evid);
    if (ev) { editId = ev.id; editText = ev.text; editColor = ev.color; renderPanel(); focusEditTA(); }
    return;
  }
  if (a === 'cancel-edit') { editId = null; renderPanel(); return; }
  if (a === 'set-edit-col') {
    readEditTA();
    editColor = el.dataset.col;
    renderPanel();
    focusEditTA();
    return;
  }
  if (a === 'save-edit') {
    readEditTA();
    await doSaveEdit(el.dataset.evid);
    return;
  }
  if (a === 'del-ev') {
    await doDelete(el.dataset.evid);
    return;
  }
});

document.getElementById('app').addEventListener('keydown', async e => {
  if (e.target.id === 'newTA' && e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    newText = e.target.value;
    await doAddEvent();
  }
  if (e.target.id === 'editTA' && e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    editText = e.target.value;
    const evid = e.target.dataset.evid;
    if (evid) await doSaveEdit(evid);
  }
});

document.getElementById('app').addEventListener('input', e => {
  if (e.target.dataset.a === 'edit-label') {
    draftLabels[e.target.dataset.col] = e.target.value;
  }
});

// ─── START ────────────────────────────────────────────────────────────────────
initFirebase();
</script>
</body>
</html>
